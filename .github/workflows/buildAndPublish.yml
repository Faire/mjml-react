name: Build and publish @faire/mjml-react if the package version has bumped.

on:
  push:
    branches:
      - main
jobs:
  buildAndPublish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - uses: actions/setup-node@v1
        with:
          node-version: 14.x

      - name: Set user as PR-bot
        run: |
          echo "GITHUB_TOKEN=${{ secrets.PR_BOT_GITHUB_TOKEN }}" >> $GITHUB_ENV
          git config --global user.name "Faire PR Bot"
          git config --global user.email "pr-bot@faire.com"

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "::set-output name=dir::$(yarn cache dir)"
      - uses: actions/cache@v2
        id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-
      - name: yarn install
        run: yarn install

      - name: Build web-tools
        run: yarn build
      - name: Publish if bumped
        run: yarn publishIfBumped
